<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentGo</title>
<link rel="stylesheet" href="/ui/static/vendor/highlight.min.css">
<style>
/* ===== Reset & Variables ===== */
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0f0f11; --bg2: #141417; --bg3: #1c1c21; --bg4: #24242b;
  --border: #2e2e38; --border2: #3a3a45;
  --text: #e4e4e7; --text2: #9898a4; --text3: #6b6b7b;
  --accent: #6366f1; --accent2: #818cf8; --accent-bg: rgba(99,102,241,0.12);
  --green: #34d399; --orange: #fb923c; --red: #f87171; --blue: #60a5fa;
  --radius: 10px; --radius-sm: 6px; --radius-lg: 14px;
  --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --side-w: 260px; --preview-w: 460px;
  --sb-pad-x: 12px; --sb-gutter: 20px; --sb-gap: 6px;
}
body {
  font-family: var(--font); background: var(--bg); color: var(--text);
  height: 100vh; overflow: hidden;
}

/* ===== Layout: CSS Grid ===== */
.app {
  display: grid;
  grid-template-columns: var(--side-w) 0 minmax(0, 1fr) 0 0;
  height: 100vh;
  transition: grid-template-columns 0.2s;
}
.app.sidebar-collapsed {
  grid-template-columns: 48px 0 minmax(0, 1fr) 0 0;
}
.app.preview-open {
  grid-template-columns: var(--side-w) 0 minmax(0, 1fr) 0 var(--preview-w);
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--border); }

/* ===== Sidebar ===== */
.sidebar {
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-rail {
  display: none; background: var(--bg2); border-right: 1px solid var(--border);
  flex-direction: column; align-items: center; padding-top: 12px; gap: 8px;
}
.sidebar-collapsed .sidebar { display: none; }
.sidebar-collapsed .sidebar-rail { display: flex; }
.rail-btn {
  width: 32px; height: 32px; border-radius: var(--radius-sm); border: none;
  background: transparent; color: var(--text2); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.rail-btn:hover { background: var(--bg3); color: var(--text); }

/* Sidebar Header */
.side-header {
  display: flex; align-items: center; padding: 14px var(--sb-pad-x) 10px;
  gap: 8px; flex-shrink: 0;
}
.side-logo {
  width: 24px; height: 24px; border-radius: 6px;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: #fff; font-weight: 700; flex-shrink: 0;
}
.side-brand { font-size: 15px; font-weight: 700; flex: 1; }
.side-header-btn {
  width: 28px; height: 28px; border-radius: var(--radius-sm); border: none;
  background: transparent; color: var(--text2); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.side-header-btn:hover { background: var(--bg3); color: var(--text); }

/* New Chat Button */
.new-chat-btn {
  margin: 4px var(--sb-pad-x) 8px; padding: 8px 12px;
  background: var(--accent-bg); border: 1px solid rgba(99,102,241,0.25);
  border-radius: var(--radius-sm); color: var(--accent2); font-size: 13px;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  font-family: inherit; font-weight: 500; flex-shrink: 0;
  transition: background 0.15s;
}
.new-chat-btn:hover { background: rgba(99,102,241,0.2); }
.new-chat-btn .nci { font-size: 15px; }

/* Workspace Groups */
.side-scroll {
  flex: 1; overflow-y: auto; padding: 0 0 8px;
}

/* Workspace group */
.ws-group {}
.ws-header {
  display: flex; align-items: center; padding: 6px var(--sb-pad-x); gap: 6px;
  cursor: pointer; border-radius: var(--radius-sm); margin: 1px 4px;
  user-select: none;
}
.ws-header:hover { background: var(--bg3); }
.ws-chevron { font-size: 10px; color: var(--text3); width: 14px; text-align: center; transition: transform 0.15s; flex-shrink: 0; }
.ws-group.collapsed .ws-chevron { transform: rotate(-90deg); }
.ws-icon { font-size: 14px; width: var(--sb-gutter); text-align: center; flex-shrink: 0; }
.ws-name { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ws-path { font-size: 11px; color: var(--text3); padding: 0 var(--sb-pad-x) 4px calc(var(--sb-pad-x) + var(--sb-gutter) + var(--sb-gap)); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ws-sessions { }
.ws-group.collapsed .ws-sessions { display: none; }

/* Session row */
.sess-row {
  display: flex; align-items: center; padding: 5px var(--sb-pad-x); gap: var(--sb-gap);
  cursor: pointer; border-radius: var(--radius-sm); margin: 1px 6px;
  font-size: 13px; color: var(--text2); transition: background 0.1s;
}
.sess-row:hover { background: var(--bg3); color: var(--text); }
.sess-row.active {
  background: var(--accent-bg); color: var(--accent2);
}
.sess-lead {
  width: var(--sb-gutter); text-align: center; flex-shrink: 0; font-size: 10px;
}
.sess-lead .busy-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); opacity: 0.6;
}
.sess-lead .unread-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--blue);
}
.sess-title {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sess-title-input {
  flex: 1; background: var(--bg4); border: 1px solid var(--accent);
  border-radius: 3px; color: var(--text); font-size: 12px; padding: 1px 4px;
  font-family: inherit; outline: none; width: 100%;
}
.sess-ts { font-size: 11px; color: var(--text3); flex-shrink: 0; }

/* ===== Conversation Pane ===== */
.conversation {
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg);
}

/* Chat Header */
.chat-header {
  height: 48px; padding: 0 16px; display: flex; align-items: center;
  border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
  gap: 8px;
}
.ch-breadcrumb {
  display: flex; align-items: center; gap: 4px; font-size: 13px;
  max-width: 46%; overflow: hidden;
}
.ch-ws {
  color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.ch-sep { color: var(--text3); }
.ch-ses {
  color: var(--text); font-weight: 500; 
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  cursor: pointer;
}
.ch-ses:hover { color: var(--accent2); }
.ch-rename-input {
  background: var(--bg4); border: 1px solid var(--accent);
  border-radius: 3px; color: var(--text); font-size: 13px; padding: 1px 6px;
  font-family: inherit; outline: none;
}
.ch-spacer { flex: 1; }
.ch-model {
  font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 20px; background: var(--bg3); border: 1px solid var(--border);
  cursor: pointer; white-space: nowrap;
}
.ch-model:hover { border-color: var(--accent); }
.ch-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; padding: 3px 10px; border-radius: 20px;
}
.ch-status.connected { color: var(--green); background: rgba(52,211,153,0.1); }
.ch-status.disconnected { color: var(--red); background: rgba(248,113,113,0.1); }
.ch-status-dot { width: 6px; height: 6px; border-radius: 50%; }
.ch-status.connected .ch-status-dot { background: var(--green); }
.ch-status.disconnected .ch-status-dot { background: var(--red); }

/* Messages */
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px 0; scroll-behavior: smooth;
}

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text2); padding: 40px;
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 6px; }
.empty-state p { font-size: 13px; margin-bottom: 20px; text-align: center; max-width: 400px; }
.suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.suggestion-chip {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; padding: 7px 14px; font-size: 13px;
  cursor: pointer; color: var(--text2); transition: all 0.15s;
}
.suggestion-chip:hover { border-color: var(--accent); color: var(--accent); }

/* Messages */
.msg {
  padding: 6px 24px; animation: fadeIn 0.2s;
  display: flex; gap: 12px; max-width: 100%;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.msg-avatar {
  width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; margin-top: 2px;
}
.msg-user .msg-avatar { background: var(--accent); }
.msg-assistant .msg-avatar { background: var(--bg3); border: 1px solid var(--border); }
.msg-body { flex: 1; min-width: 0; }
.msg-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 3px;
}
.msg-header .msg-name { font-size: 13px; font-weight: 600; }
.msg-header .msg-time { font-size: 11px; color: var(--text3); }
.msg-content { font-size: 14px; line-height: 1.6; }
.msg-bubble { font-size: 14px; line-height: 1.7; }

/* User images */
.msg-images { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.msg-images img {
  max-width: 240px; max-height: 180px; border-radius: 8px;
  border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s;
}
.msg-images img:hover { transform: scale(1.02); }

/* Code blocks */
.msg-bubble pre {
  margin: 8px 0; border-radius: 8px; overflow-x: auto;
  font-family: var(--mono); font-size: 13px; position: relative;
}
.msg-bubble pre code.hljs { border-radius: 8px; font-size: 13px; }
.msg-bubble code:not(.hljs) {
  font-family: var(--mono); font-size: 13px; background: var(--bg3);
  padding: 1px 5px; border-radius: 3px;
}
.code-copy-btn {
  position: absolute; top: 6px; right: 6px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text2); font-size: 11px; padding: 2px 8px; cursor: pointer;
  opacity: 0; transition: opacity 0.15s;
}
.msg-bubble pre:hover .code-copy-btn { opacity: 1; }
.code-copy-btn:hover { color: var(--text); background: var(--border); }
.code-copy-btn.copied { color: var(--green); }

/* Markdown styles */
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { margin: 10px 0 6px; font-weight:600; }
.msg-bubble h1 { font-size: 18px; } .msg-bubble h2 { font-size: 16px; } .msg-bubble h3 { font-size: 15px; }
.msg-bubble ul,.msg-bubble ol { padding-left: 20px; margin: 4px 0; }
.msg-bubble li { margin: 2px 0; }
.msg-bubble table { border-collapse: collapse; margin: 8px 0; width: 100%; }
.msg-bubble th,.msg-bubble td { border: 1px solid var(--border); padding: 5px 10px; }
.msg-bubble blockquote {
  border-left: 3px solid var(--accent); margin: 8px 0; padding: 4px 12px;
  color: var(--text2);
}
.msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

/* Thinking block */
.think-block {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; margin: 6px 0; font-size: 13px; overflow: hidden;
}
.think-block-header {
  display: flex; align-items: center; gap: 6px; padding: 6px 12px;
  cursor: pointer; user-select: none; color: var(--text2);
}
.think-block-header:hover { color: var(--text); }
.think-chevron { transition: transform 0.15s; font-style: normal; font-size: 11px; }
.think-block.open .think-chevron { transform: rotate(90deg); }
.think-block-body {
  display: none; padding: 8px 12px 10px; color: var(--text2);
  font-style: italic; white-space: pre-wrap; line-height: 1.5;
  border-top: 1px solid var(--border);
  max-height: 300px; overflow-y: auto; font-size: 12px;
}
.think-block.open .think-block-body { display: block; }

/* Thinking indicator */
.thinking-indicator {
  display: flex; gap: 4px; padding: 4px 0; align-items: center;
}
.thinking-indicator span { font-size:13px; color:var(--text2); margin-right:6px; }
.thinking-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent2);
  animation: bounce 1.2s infinite;
}
.thinking-dot:nth-child(2) { animation-delay: 0.2s; }
.thinking-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); opacity:.6; }
  30% { transform: translateY(-6px); opacity:1; }
}

/* Tool group */
.tool-group {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; margin: 6px 0; overflow: hidden; font-size: 13px;
}
.tool-group-header {
  display: flex; align-items: center; gap: 6px; padding: 6px 12px;
  cursor: pointer; user-select: none; color: var(--text2);
}
.tool-group-header:hover { color: var(--text); }
.tool-group-chevron { transition: transform 0.15s; font-style: normal; font-size: 11px; }
.tool-group.open .tool-group-chevron { transform: rotate(90deg); }
.tool-group-body { display: none; border-top: 1px solid var(--border); max-height: 260px; overflow-y: auto; }
.tool-group.open .tool-group-body { display: block; }
.tool-group-counter { font-size: 11px; color: var(--text2); margin-left: auto; font-family: var(--mono); }

/* Tool card */
.tool-card {
  background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05);
  overflow: hidden; font-size: 12px;
}
.tool-card:last-child { border-bottom: none; }
.tool-card-header {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  background: rgba(255,255,255,0.02); cursor: pointer;
}
.tool-card-header .tool-icon { font-size: 12px; opacity: 0.7; }
.tool-card-header .tool-name { font-family: var(--mono); font-weight: 600; color: var(--text2); }
.tool-card-header .tool-summary { color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.tool-card-header .tool-status { font-size: 11px; color: var(--text2); }
.tool-card-header .tool-status.running { color: var(--blue); }
.tool-card-header .tool-status.done { color: var(--green); }
.tool-card-body { display: none; padding: 8px 10px; font-family: var(--mono); color: var(--text2); max-height: 180px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
.tool-card.expanded .tool-card-body { display: block; }
.tool-section-label { color: var(--text2); opacity: 0.8; margin-bottom: 3px; text-transform: uppercase; font-size: 10px; }
.tool-section + .tool-section { margin-top: 8px; }

/* ===== Composer ===== */
.chat-dock {
  border-top: 1px solid var(--border); background: var(--bg2);
  padding: 10px 24px 14px; flex-shrink: 0;
}

/* Attachment strip */
.input-attachments {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;
}
.input-attachments:empty { display: none; }
.attach-preview {
  position: relative; width: 60px; height: 60px;
  border-radius: 8px; overflow: hidden; border: 1px solid var(--border);
}
.attach-preview img { width: 100%; height: 100%; object-fit: cover; }
.attach-preview .attach-remove {
  position: absolute; top: 2px; right: 2px;
  width: 18px; height: 18px; border-radius: 50%;
  background: rgba(0,0,0,0.7); color: #fff; border: none;
  font-size: 11px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
}
.attach-preview .attach-remove:hover { background: var(--red); }

/* Input row */
.input-row { display: flex; gap: 8px; align-items: flex-end; }
.input-wrapper {
  flex: 1; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 0; display: flex; flex-direction: column;
  transition: border 0.15s;
}
.input-wrapper:focus-within { border-color: var(--accent); }
.input-wrapper textarea {
  width: 100%; background: transparent; border: none;
  padding: 10px 14px; color: var(--text);
  font-size: 14px; resize: none; height: 44px; max-height: 120px;
  font-family: inherit; outline: none;
}
.input-wrapper textarea::placeholder { color: var(--text2); }

/* Composer toolbar */
.composer-toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 0 8px 6px; flex-wrap: wrap;
}
.toolbar-btn {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 15px; padding: 2px 6px; border-radius: 4px; transition: all 0.15s;
  font-family: inherit;
}
.toolbar-btn:hover { color: var(--text); background: var(--bg4); }
.tb-left { display: flex; align-items: center; gap: 4px; }
.tb-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.tb-spacer { flex: 1; }

/* Mode pill */
.mode-pill {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: var(--bg4); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; white-space: nowrap;
}
.mode-pill:hover { border-color: var(--accent); color: var(--accent); }
.mode-pill.active { border-color: var(--accent); color: var(--accent); }

/* Permission pill */
.perm-pill {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: var(--bg4); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; white-space: nowrap;
}
.perm-pill:hover { border-color: var(--accent); color: var(--accent); }

/* Context ring */
.ctx-ring {
  position: relative; width: 20px; height: 20px; flex-shrink: 0; cursor: pointer;
}
.ctx-ring svg { width: 20px; height: 20px; transform: rotate(-90deg); }
.ctx-ring-bg { fill: none; stroke: var(--bg4); stroke-width: 2.5; }
.ctx-ring-fg { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; transition: stroke-dashoffset 0.3s; }
.ctx-ring-fg.warning { stroke: var(--orange); }
.ctx-ring-fg.danger { stroke: var(--red); }
.ctx-ring .ctx-label {
  position: absolute; inset: 0; display: flex;
  align-items: center; justify-content: center;
  font-size: 7px; font-weight: 700; color: var(--text2);
}

/* Model pill */
.model-pill {
  font-size: 12px; padding: 2px 10px; border-radius: 10px;
  background: var(--bg4); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; white-space: nowrap;
  font-family: var(--mono); max-width: 140px; overflow: hidden; text-overflow: ellipsis;
}
.model-pill:hover { border-color: var(--accent); color: var(--accent); }

/* Send / Abort buttons */
.send-btn, .abort-btn {
  width: 42px; height: 42px; border-radius: var(--radius); border: none;
  cursor: pointer; font-size: 17px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; flex-shrink: 0;
}
.send-btn { background: var(--accent); color: #fff; }
.send-btn:hover { background: var(--accent2); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.abort-btn { background: var(--red); color: #fff; }
.abort-btn:hover { background: #ef4444; }

/* ===== Dropdowns ===== */
.dropdown-overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
}
.dropdown-overlay.open { display: block; }
.dropdown-menu {
  position: fixed; z-index: 101; min-width: 140px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  max-height: 240px; overflow-y: auto;
}
.dropdown-item {
  padding: 6px 12px; font-size: 13px; color: var(--text2);
  cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px;
}
.dropdown-item:hover { background: var(--bg4); color: var(--text); }
.dropdown-item.active { color: var(--accent); }
.dropdown-item .di-check { width: 14px; text-align: center; }
.dropdown-sep { border-top: 1px solid var(--border); margin: 4px 0; }

/* ===== Drag overlay ===== */
.drag-overlay {
  display: none; position: absolute; inset: 0;
  background: rgba(99,102,241,0.1); border: 2px dashed var(--accent);
  z-index: 50; justify-content: center; align-items: center;
  font-size: 16px; color: var(--accent); border-radius: 8px;
}
.drag-overlay.visible { display: flex; }

/* ===== Lightbox ===== */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.85); justify-content: center; align-items: center;
  cursor: zoom-out;
}
.lightbox.open { display: flex; }
.lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

/* ===== Right Preview Panel ===== */
.preview-panel {
  background: var(--bg2); border-left: 1px solid var(--border);
  overflow: hidden; display: flex; flex-direction: column;
}
.preview-header {
  display: flex; align-items: center; padding: 12px 16px;
  border-bottom: 1px solid var(--border); gap: 8px;
}
.preview-header .pv-title { font-size: 14px; font-weight: 600; flex: 1; }
.preview-close {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 16px; padding: 2px 6px; border-radius: 4px;
}
.preview-close:hover { background: var(--bg3); color: var(--text); }
.preview-body { flex: 1; overflow-y: auto; padding: 16px; }

/* ===== Resize Handle ===== */
.resize-handle {
  cursor: col-resize; position: relative; z-index: 10;
  width: 0; overflow: visible; flex-shrink: 0;
}
.resize-handle::after {
  content: ''; position: absolute; top: 0; bottom: 0;
  left: -3px; width: 6px;
}
.resize-handle:hover::after { background: rgba(99,102,241,0.15); }
.resize-handle.resizing::after { background: rgba(99,102,241,0.2); }

/* ===== New msg pill ===== */
.new-msg-pill {
  position: absolute; bottom: 160px; left: 50%; transform: translateX(-50%);
  background: var(--bg3); border: 1px solid var(--accent);
  color: var(--accent2); font-size: 12px; padding: 4px 14px;
  border-radius: 20px; cursor: pointer; display: none; z-index: 10;
  white-space: nowrap;
}
.new-msg-pill:hover { background: var(--accent-bg); }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .app { grid-template-columns: 48px 0 minmax(0, 1fr) 0 0 !important; }
  .sidebar { display: none !important; }
  .sidebar-rail { display: flex !important; }
  .chat-header .ch-model { font-size: 11px; padding: 2px 6px; }
  .msg { padding: 6px 12px; }
  .chat-dock { padding: 8px 12px 12px; }
}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="side-header">
      <div class="side-logo">A</div>
      <span class="side-brand">AgentGo</span>
      <button class="side-header-btn" onclick="toggleSidebar()" title="折叠侧边栏">◀</button>
    </div>
    <button class="new-chat-btn" onclick="newSession()">
      <span class="nci">+</span> 新对话
    </button>
    <div class="side-scroll" id="workspaceList"></div>
  </aside>

  <!-- Sidebar Rail (collapsed) -->
  <div class="sidebar-rail" id="sidebarRail">
    <button class="rail-btn" onclick="toggleSidebar()" title="展开侧边栏">☰</button>
    <button class="rail-btn" onclick="newSession()" title="新对话">+</button>
  </div>

  <!-- ===== Resize Handle ===== -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- ===== Conversation Pane ===== -->
  <div class="conversation" id="conversation" style="position:relative;">
    <!-- Chat Header -->
    <div class="chat-header" id="chatHeader">
      <div class="ch-breadcrumb" id="chBreadcrumb">
        <span class="ch-ws" id="chWorkspace">工作区</span>
        <span class="ch-sep">/</span>
        <span class="ch-ses" id="chSession" ondblclick="startRenameSession()">会话</span>
        <input class="ch-rename-input" id="chRenameInput" style="display:none"
               onblur="commitRenameSession()" onkeydown="if(event.key==='Enter')commitRenameSession();if(event.key==='Escape')cancelRenameSession()">
      </div>
      <div class="ch-spacer"></div>
      <div class="ch-model" id="chModel" onclick="toggleModelDropdown()">🤖 gpt-4o</div>
      <div class="ch-status disconnected" id="wsStatus">
        <span class="ch-status-dot"></span>
        <span id="wsStatusText">未连接</span>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🤖</div>
        <h3>AgentGo</h3>
        <p>AI 助手已就绪。输入消息开始对话，支持粘贴或拖放图片。</p>
        <div class="suggestion-chips">
          <div class="suggestion-chip" onclick="useSuggestion('分析当前项目的代码结构')">分析代码结构</div>
          <div class="suggestion-chip" onclick="useSuggestion('帮我做一次安全审查')">安全审查</div>
          <div class="suggestion-chip" onclick="useSuggestion('查看最近的 git 提交记录')">查看提交</div>
        </div>
      </div>
    </div>

    <!-- New messages pill -->
    <div class="new-msg-pill" id="newMsgPill" onclick="scrollToBottom()">↓ 新消息</div>

    <!-- Chat Dock / Composer -->
    <div class="chat-dock" id="chatDock">
      <div class="input-attachments" id="inputAttachments"></div>
      <div class="input-row">
        <div class="input-wrapper" id="inputWrapper">
          <textarea id="chatInput" placeholder="输入消息... (Shift+Enter 换行，Ctrl+V 粘贴图片)" rows="1"></textarea>
          <div class="composer-toolbar" id="composerToolbar">
            <div class="tb-left">
              <button class="toolbar-btn" onclick="triggerImageUpload()" title="添加图片">🖼️</button>
              <input type="file" id="imageFileInput" accept="image/*" multiple style="display:none" onchange="handleFileSelect(event)">
              <span class="perm-pill" id="permPill" onclick="togglePermDropdown()">manual</span>
              <span class="mode-pill" id="modePill" onclick="toggleModeDropdown()">chat</span>
            </div>
            <div class="tb-right">
              <div class="ctx-ring" id="ctxRing" title="上下文使用率">
                <svg viewBox="0 0 20 20">
                  <circle class="ctx-ring-bg" cx="10" cy="10" r="8"/>
                  <circle class="ctx-ring-fg" id="ctxRingArc" cx="10" cy="10" r="8"
                          stroke-dasharray="50.27" stroke-dashoffset="50.27"/>
                </svg>
                <span class="ctx-label" id="ctxLabel">0%</span>
              </div>
              <span class="model-pill" id="modelPill" onclick="toggleModelDropdown()">gpt-4o</span>
            </div>
          </div>
        </div>
        <button class="abort-btn" id="abortBtn" onclick="abortMessage()" style="display:none" title="中止生成">■</button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送">▶</button>
      </div>
    </div>

    <!-- Drag overlay -->
    <div class="drag-overlay" id="dragOverlay">拖放图片到此处</div>
  </div>

  <!-- ===== Resize Handle (right) ===== -->
  <div class="resize-handle" id="resizeHandleRight"></div>

  <!-- ===== Preview Panel ===== -->
  <aside class="preview-panel" id="previewPanel">
    <div class="preview-header">
      <span class="pv-title" id="pvTitle">详情</span>
      <button class="preview-close" onclick="closePreview()">✕</button>
    </div>
    <div class="preview-body" id="previewBody"></div>
  </aside>
</div>

<!-- ===== Dropdown Overlay ===== -->
<div class="dropdown-overlay" id="dropdownOverlay" onclick="closeAllDropdowns()"></div>
<div class="dropdown-menu" id="modelDropdown"></div>
<div class="dropdown-menu" id="modeDropdown"></div>
<div class="dropdown-menu" id="permDropdown"></div>

<!-- ===== Lightbox ===== -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
</div>

<script src="/ui/static/vendor/marked.min.js"></script>
<script src="/ui/static/vendor/purify.min.js"></script>
<script src="/ui/static/vendor/highlight.min.js"></script>
<script src="/ui/static/app.js"></script>
</body>
</html>
