# mini-agent 配置示例
# 复制此文件为 config.yaml 并修改配置

# LLM Provider 配置（单 provider 简写）
provider:
  type: openai          # openai 兼容格式（适用于 OpenAI / DeepSeek / Ollama 等）
  base_url: "https://api.openai.com/v1"   # API 地址
  api_key: "sk-xxx"     # API Key
  model: "gpt-4o"       # 模型名称
  timeout: 120s         # 超时时间

# 多 Provider Failover 配置（可选，优先级按列表顺序）
# providers:
#   - id: primary
#     type: openai
#     base_url: "https://api.openai.com/v1"
#     api_key: "sk-xxx"
#     model: "gpt-4o"
#   - id: fallback
#     type: openai
#     base_url: "https://api.deepseek.com/v1"
#     api_key: "sk-xxx"
#     model: "deepseek-chat"

# 多模型路由模式（可选，根据任务复杂度自动选择模型）
# 配置 tier 字段后自动启用路由模式（fast/balanced/powerful）。
# providers:
#   - id: fast-model
#     type: openai
#     base_url: "https://api.openai.com/v1"
#     api_key: "sk-xxx"
#     model: "gpt-4o-mini"
#     tier: fast            # 简单问答、翻译等轻量任务
#   - id: balanced-model
#     type: openai
#     base_url: "https://api.openai.com/v1"
#     api_key: "sk-xxx"
#     model: "gpt-4o"
#     tier: balanced         # 常规任务（默认）
#   - id: powerful-model
#     type: openai
#     base_url: "https://api.openai.com/v1"
#     api_key: "sk-xxx"
#     model: "o1-preview"
#     tier: powerful         # 复杂推理、多文件重构等

# HTTP Gateway 配置
gateway:
  addr: ":8080"         # 监听地址
  token: ""             # Bearer token 认证（空则不认证）

# 工作区目录（文件工具的沙箱根目录）
workspace_dir: "."

# 上下文 token 上限
max_context_tokens: 100000

# Agent 最大工具调用轮次（防无限循环，默认 200）
max_turns: 200

# 额外 system prompt（追加到默认 prompt 后）
system_prompt_extra: ""

# Skill 目录列表
skill_dirs:
  - "./skills"

# 记忆系统
memory:
  enabled: false
  dir: ".agent/memory"
  # 向量语义搜索（可选，需要 Embedding API）
  # 启用后 memory_search 将使用 cosine 相似度进行语义匹配
  # 未配置时自动降级为关键词搜索
  embedding_model: ""          # Embedding 模型名（如 text-embedding-3-small）
  embedding_url: ""            # Embedding API 地址（如 https://api.openai.com/v1）
  embedding_api_key: ""        # Embedding API Key

# MCP 协议（Model Context Protocol）
# 启用后，Agent 可作为 MCP Server 被外部客户端（如 VS Code Copilot）调用
mcp:
  enabled: false
  mode: http                   # stdio（标准输入输出）或 http（HTTP SSE + Streamable HTTP）
  # stdio 模式：通过 stdin/stdout 进行 JSON-RPC 2.0 通信，适合编辑器集成
  # http 模式：注册 /mcp 路由到 Gateway，支持 SSE 和 Streamable HTTP 两种传输

# 聊天渠道配置
# 启用后，用户可通过聊天软件直接与 Agent 交互
channels:
  # 企业微信应用消息渠道
  # 配置步骤：
  #   1. 在企业微信管理后台 (https://work.weixin.qq.com) 创建自建应用
  #   2. 记录 CorpID、AgentID、Secret
  #   3. 在「接收消息」中设置 URL: http://your-server:8080/channel/wecom/callback
  #   4. 记录 Token 和 EncodingAESKey 填入下方配置
  wecom:
    enabled: false
    corp_id: ""              # 企业 ID（在「我的企业」页面查看）
    agent_id: 0              # 应用 AgentID
    secret: ""               # 应用 Secret
    token: ""                # 接收消息回调的 Token
    encoding_aes_key: ""     # 接收消息回调的 EncodingAESKey

  # 钉钉企业内部机器人渠道
  # 配置步骤：
  #   1. 在钉钉开放平台 (https://open-dev.dingtalk.com) 创建企业内部应用
  #   2. 开启机器人能力
  #   3. 配置消息接收地址: http://your-server:8080/channel/dingtalk/callback
  #   4. 记录 AppKey 和 AppSecret
  dingtalk:
    enabled: false
    app_key: ""              # 应用 AppKey
    app_secret: ""           # 应用 AppSecret
    robot_code: ""           # 机器人编码（可选）

  # 飞书（Lark）机器人渠道
  # 配置步骤：
  #   1. 在飞书开放平台 (https://open.feishu.cn) 创建企业自建应用
  #   2. 开启机器人能力
  #   3. 在「事件订阅」中配置请求地址: http://your-server:8080/channel/feishu/callback
  #   4. 订阅 im.message.receive_v1 事件
  #   5. 记录 App ID、App Secret、Verification Token
  feishu:
    enabled: false
    app_id: ""               # 应用 App ID
    app_secret: ""           # 应用 App Secret
    verification_token: ""   # 事件订阅 Verification Token
    encrypt_key: ""          # 事件订阅 Encrypt Key（可选，用于消息加密）

# 访问控制（ACL）
# 控制哪些用户可以使用 Agent、哪些工具对普通用户受限
# 用户标识格式: "platform:userID"，例如 "wecom:ZhangSan"、"dingtalk:staff123"
acl:
  enabled: false
  default_policy: allow      # "allow"（默认放行）或 "deny"（默认拒绝）
  # 管理员（拥有全部权限，不受工具限制）
  admins: []
    # - "wecom:admin_userid"
    # - "dingtalk:admin_staffid"
  # 白名单（配置后只有列表中的用户可以使用 Agent）
  allow_users: []
    # - "wecom:user1"
    # - "feishu:ou_xxx"
  # 黑名单（明确禁止的用户）
  deny_users: []
    # - "wecom:blocked_user"
  # 非管理员禁用的工具（危险操作限制）
  deny_tools: []
    # - "run_command"    # 禁止执行终端命令
    # - "write_file"     # 禁止写文件
    # - "edit_file"      # 禁止编辑文件

# 定时任务
# 支持格式：
#   - "every 5m" / "every 1h" / "every 30s" — 固定间隔
#   - "daily 19:00" — 每天定时（24 小时制）
#
# 示例：每天 19:00 自动 Code Review GitLab 仓库
# crons:
#   - id: daily-code-review
#     schedule: "daily 19:00"
#     prompt: |
#       请执行以下 Code Review 任务：
#       1. 进入仓库目录 /path/to/your/repo
#       2. 使用 git_pull 拉取最新代码
#       3. 使用 git_log（since: "1 day ago"）查看今天的所有提交
#       4. 对每个提交使用 git_show 查看完整 diff
#       5. 按照 Code Review 技能要求，对每个提交进行审查
#       6. 生成完整的审查报告
#       7. 将报告通过 webhook_notify 发送到 https://your-webhook-url
#
#   - id: daily-summary
#     schedule: "every 24h"
#     prompt: "生成今日工作总结"

# 速率限制
# 基于令牌桶算法，按 IP/用户进行请求限流，防止 API 滥用
rate_limit:
  enabled: false
  requests_per_sec: 10           # 每秒最大请求数（per IP）
  burst: 20                      # 突发容量
  token_quota: 0                 # 每用户每日 token 配额（0 = 不限制）
  # 示例：限制每个用户每天最多消耗 100 万 token

# Web 搜索
# 启用后 Agent 可通过 web_search 工具搜索实时信息
web_search:
  enabled: false
  engine: brave                  # brave（推荐）或 searxng（自部署）
  api_key: ""                    # Brave Search API Key（https://brave.com/search/api/）
  base_url: ""                   # SearXNG 实例地址（仅 searxng 引擎时需要）

# Webhook 白名单
# 限制 webhook_notify 工具只能向以下 URL 发送通知
# 为空则不限制（注意：cron 模式下强烈建议配置白名单，防止 LLM 被诱导发送到恶意地址）
# webhook_urls:
#   - "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_KEY"
